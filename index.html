    <!-- =====================================================
    HEADER
  ====================================================== -->
    <header role="banner" aria-label="CSS Art Generator header">
        <div class="header-inner">
            <div class="brand">
                <span class="brand-icon" aria-hidden="true">🎨</span>
                <div>
                    <h1 class="brand-title">CSS Art Generator</h1>
                    <p class="brand-sub">Real-Time Shape · Gradient · Animation Tool</p>
                </div>
            </div>
            <button id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle theme">
                🌙 Dark Mode
            </button>
        </div>
    </header>

    <!-- =====================================================
    MAIN CONTENT
  ====================================================== -->
    <main id="main-content" role="main" aria-label="CSS Art Generator workspace">

        <!-- ── LEFT: Control Panel ── -->
        <aside class="controls" role="complementary" aria-label="Shape and style controls">

            <!-- Shape -->
            <section aria-labelledby="shapeHeading">
                <h2 id="shapeHeading" class="section-label">Shape</h2>
                <div class="btn-group" id="shapeSelector" role="group" aria-label="Shape type">
                    <button class="active" data-shape="circle" aria-pressed="true">Circle</button>
                    <button data-shape="square" aria-pressed="false">Square</button>
                    <button data-shape="blob" aria-pressed="false">Blob</button>
                </div>
                <label for="size">
                    Size
                    <output id="sizeVal" for="size">200px</output>
                </label>
                <input type="range" id="size" name="size" min="50" max="400" value="200"
                    aria-label="Shape size in pixels" aria-valuemin="50" aria-valuemax="400" aria-valuenow="200" />

                <label for="radius">
                    Border Radius
                    <output id="radiusVal" for="radius">50%</output>
                </label>
                <input type="range" id="radius" name="radius" min="0" max="50" value="50"
                    aria-label="Border radius percentage" aria-valuemin="0" aria-valuemax="50" aria-valuenow="50" />
            </section>

            <!-- Gradient -->
            <section aria-labelledby="gradHeading">
                <h2 id="gradHeading" class="section-label">Gradient</h2>
                <div class="btn-group" id="gradientType" role="group" aria-label="Gradient type">
                    <button class="active" data-grad="linear" aria-pressed="true">Linear</button>
                    <button data-grad="radial" aria-pressed="false">Radial</button>
                    <button data-grad="conic" aria-pressed="false">Conic</button>
                </div>
                <label for="color1">Color Stop 1</label>
                <input type="color" id="color1" name="color1" value="#ff6ec7" aria-label="First gradient color" />

                <label for="color2">Color Stop 2</label>
                <input type="color" id="color2" name="color2" value="#a855f7" aria-label="Second gradient color" />

                <label for="angle">
                    Angle
                    <output id="angleVal" for="angle">135°</output>
                </label>
                <input type="range" id="angle" name="angle" min="0" max="360" value="135"
                    aria-label="Gradient angle in degrees" aria-valuemin="0" aria-valuemax="360" aria-valuenow="135" />
            </section>

            <!-- Shadow -->
            <section aria-labelledby="shadowHeading">
                <h2 id="shadowHeading" class="section-label">Shadow</h2>
                <label for="blur">
                    Blur
                    <output id="blurVal" for="blur">30px</output>
                </label>
                <input type="range" id="blur" name="blur" min="0" max="100" value="30" aria-label="Shadow blur radius"
                    aria-valuemin="0" aria-valuemax="100" aria-valuenow="30" />

                <label for="spread">
                    Spread
                    <output id="spreadVal" for="spread">5px</output>
                </label>
                <input type="range" id="spread" name="spread" min="0" max="50" value="5"
                    aria-label="Shadow spread radius" aria-valuemin="0" aria-valuemax="50" aria-valuenow="5" />

                <label for="shadowColor">Shadow Color</label>
                <input type="color" id="shadowColor" name="shadowColor" value="#a855f7" aria-label="Shadow color" />
            </section>

            <!-- Animation -->
            <section aria-labelledby="animHeading">
                <h2 id="animHeading" class="section-label">Animation</h2>
                <div class="btn-group" id="animType" role="group" aria-label="Animation type">
                    <button class="active" data-anim="none" aria-pressed="true">None</button>
                    <button data-anim="spin" aria-pressed="false">Spin</button>
                    <button data-anim="pulse" aria-pressed="false">Pulse</button>
                    <button data-anim="float" aria-pressed="false">Float</button>
                    <button data-anim="bounce" aria-pressed="false">Bounce</button>
                </div>
                <label for="speed">
                    Speed
                    <output id="speedVal" for="speed">2.0s</output>
                </label>
                <input type="range" id="speed" name="speed" min="5" max="50" value="20" aria-label="Animation speed"
                    aria-valuemin="5" aria-valuemax="50" aria-valuenow="20" />
                <button id="pauseBtn" aria-label="Pause or play animation" title="Toggle animation playback">
                    ⏸ Pause
                </button>
            </section>

            <button id="resetBtn" aria-label="Reset all controls to default values" title="Reset everything">
                🔄 Reset All
            </button>
        </aside>

        <!-- ── RIGHT: Canvas + Output ── -->
        <div class="right-panel">

            <!-- Live Canvas -->
            <section class="canvas" aria-label="Live shape preview canvas" aria-live="polite" aria-atomic="false">
                <div id="shape" role="img" aria-label="Generated CSS art shape"></div>
            </section>

            <!-- CSS Output -->
            <section class="css-output" aria-labelledby="cssOutputHeading">
                <div class="output-header">
                    <h2 id="cssOutputHeading" class="output-title">
                        <span aria-hidden="true">✦</span> Generated CSS
                    </h2>
                    <button id="copyBtn" aria-label="Copy generated CSS to clipboard" title="Copy CSS">
                        📋 Copy
                    </button>
                </div>
                <pre id="cssCode" aria-label="Generated CSS code" tabindex="0"></pre>
            </section>

        </div><!-- /.right-panel -->

    </main>
